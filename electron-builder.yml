appId: com.flashnote.app
productName: FlashNote
copyright: Copyright © 2025
icon: assets/icons/v2/icon_dock_512x512.png

directories:
  output: dist

files:
  - out/**/*
  - assets/**/*

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  # Code signing & notarization — requires Apple Developer account ($99/yr).
  # Uncomment and fill in when available. See docs/macos-signing.md for details.
  # identity: "Developer ID Application: Your Name (TEAMID)"
  # hardenedRuntime: true
  # notarize:
  #   teamId: "TEAMID"

win:
  target:
    - target: nsis
      arch: [x64]

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility
  syncDesktopName: true
