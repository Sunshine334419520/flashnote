name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm rebuild
      - run: pnpm build
        env:
          FLASHNOTE_NOTION_CLIENT_ID: ${{ vars.FLASHNOTE_NOTION_CLIENT_ID }}
          FLASHNOTE_NOTION_CLIENT_SECRET: ${{ secrets.FLASHNOTE_NOTION_CLIENT_SECRET }}
          FLASHNOTE_ONENOTE_CLIENT_ID: ${{ vars.FLASHNOTE_ONENOTE_CLIENT_ID }}
      - run: pnpm package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm rebuild
      - run: pnpm build
        env:
          FLASHNOTE_NOTION_CLIENT_ID: ${{ vars.FLASHNOTE_NOTION_CLIENT_ID }}
          FLASHNOTE_NOTION_CLIENT_SECRET: ${{ secrets.FLASHNOTE_NOTION_CLIENT_SECRET }}
          FLASHNOTE_ONENOTE_CLIENT_ID: ${{ vars.FLASHNOTE_ONENOTE_CLIENT_ID }}
      - run: pnpm package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm rebuild
      - run: pnpm build
        env:
          FLASHNOTE_NOTION_CLIENT_ID: ${{ vars.FLASHNOTE_NOTION_CLIENT_ID }}
          FLASHNOTE_NOTION_CLIENT_SECRET: ${{ secrets.FLASHNOTE_NOTION_CLIENT_SECRET }}
          FLASHNOTE_ONENOTE_CLIENT_ID: ${{ vars.FLASHNOTE_ONENOTE_CLIENT_ID }}
      - run: pnpm package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
